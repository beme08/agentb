# Ruff configuration. See https://docs.astral.sh/ruff/

line-length = 100
target-version = "py310"

[lint]
# Default rules plus isort (I) and bugbear (B).
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",  # line-too-long (handled by formatter)
    "B008",  # function-call-in-default-argument (used in dataclasses)
]

[lint.per-file-ignores]
# Tests can use long lines, asserts, and `print` style names.
"tests/*" = ["E", "B"]
"scripts/*" = ["E", "B"]

[format]
quote-style = "double"
indent-style = "space"
